services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: coinportal
      POSTGRES_USER: coinportal
      POSTGRES_PASSWORD: coinportal
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  web:
    build: .
    environment:
      DJANGO_SECRET_KEY: "change-me"
      DJANGO_DEBUG: "1"
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1"
      DATABASE_URL: "postgres://coinportal:coinportal@db:5432/coinportal"
      # Default admin user (auto-created on first run)
      DJANGO_SUPERUSER_USERNAME: "admin"
      DJANGO_SUPERUSER_EMAIL: "admin@example.com"
      DJANGO_SUPERUSER_PASSWORD: "admin12345"
    ports:
      - "8000:8000"
    depends_on:
      - db
    volumes:
      - .:/app

volumes:
  pgdata:
