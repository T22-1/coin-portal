<!doctype html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Login</title>
<style>
body{font-family:system-ui; background:#0b0f17; color:#e7eefc; display:flex; align-items:center; justify-content:center; min-height:100vh; margin:0;}
.card{background:#121a2b; border:1px solid #1f2a44; border-radius:14px; padding:18px; width:380px;}
input{width:100%; padding:10px; border-radius:10px; border:1px solid #2a3b64; background:#0e1526; color:#e7eefc; margin:8px 0;}
button{background:#2b5cff; border:none; color:white; padding:10px 12px; border-radius:10px; cursor:pointer; font-weight:600; width:100%;}
.small{color:#b3c2e8; font-size:13px;}
</style>
</head>
<body>
  <div class="card">
    <h2 style="margin:0 0 10px 0;">Coin Portal Login</h2>
    <div class="small">Use your admin account (default: admin / admin12345)</div>
    {% if error %}<div style="margin-top:10px; color:#ffb4b4;">{{ error }}</div>{% endif %}
    <form method="post">
      {% csrf_token %}
      <input name="username" placeholder="Username" autocomplete="username">
      <input name="password" placeholder="Password" type="password" autocomplete="current-password">
      <button type="submit">Sign in</button>
    </form>
  </div>
</body></html>
